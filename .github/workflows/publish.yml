name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check --fix --unsafe . && pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Publish (pre-release)
        if: contains(github.ref_name, '-beta.') || contains(github.ref_name, '-rc.')
        run: npm publish --access public --tag next
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish (latest)
        if: "!contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-rc.')"
        run: npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ─── Build changelog from commits ──────────────────────────
      - name: Build changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -15)
          else
            COMMITS=$(git log --oneline "${PREV_TAG}..${VERSION}" | head -20)
          fi

          # Format for GitHub Release (markdown)
          GH_BODY=$(echo "$COMMITS" | sed 's/^[a-f0-9]* /- /')

          # Format for Discord (bullet points)
          DISCORD_BODY=$(echo "$COMMITS" | sed 's/^/• /' | head -15)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "gh_body<<GH_EOF"
            echo "$GH_BODY"
            echo "GH_EOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "discord_body<<DISCORD_EOF"
            echo "$DISCORD_BODY"
            echo "DISCORD_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.gh_body }}

            **npm:** `npm i truman-cli@${{ github.ref_name }}`
            **Try it:** `npx truman-cli roast --target https://your-app.com`

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Skip if no webhook configured
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No DISCORD_WEBHOOK_URL secret set, skipping"
            exit 0
          fi

          VERSION="${{ steps.changelog.outputs.version }}"
          # Escape newlines and quotes for JSON
          CHANGELOG=$(echo "${{ steps.changelog.outputs.discord_body }}" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')
          NPM_URL="https://www.npmjs.com/package/truman-cli"
          GITHUB_URL="https://github.com/Go-Pomegranate/Truman/releases/tag/${VERSION}"

          # Send Discord embed
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🎭 Truman ${VERSION} released\",
                \"description\": \"**Changes:**\\n\`\`\`\\n${CHANGELOG}\\n\`\`\`\",
                \"color\": 5814783,
                \"fields\": [
                  { \"name\": \"📦 npm\", \"value\": \"[truman-cli@${VERSION}](${NPM_URL})\", \"inline\": true },
                  { \"name\": \"📋 Release\", \"value\": \"[GitHub](${GITHUB_URL})\", \"inline\": true },
                  { \"name\": \"⚡ Install\", \"value\": \"\`npx truman-cli roast --target https://your-app.com\`\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"Your app's users are fake. They just don't know it yet.\" }
              }]
            }" \
            "$DISCORD_WEBHOOK"
